nameOverride: ""

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 1
containerPort: 80
servicePort: 80
strategy: RollingUpdate

namespace:
  enabled: true

dns:
  enabled: true
  hostname: ""
  exposure: "internal"

homepage:
  enabled: true
  name: ""
  description: ""
  icon: ""
  group: "Applications"
  weight: "10"

ingress:
  proxyBodySize: "100m"
  path: "/"
  annotations: {}

containerSecurityContext: {}

volumes: []
# Each entry:
#   - name: data
#     size: 1Gi
#     mountPath: /data
#     storageClass: local-path    (default)
#     accessMode: ReadWriteOnce (default)
#   - name: shared-nfs
#     mountPath: /shared
#     nfs:
#       server: 192.168.1.201
#       path: /shared-data/nas-storage
#       readOnly: true

infisical:
  enabled: false
  identityId: ""
  secretsPath: ""
  secretName: ""
  projectSlug: "homelab-k8s"
  envSlug: "prod"
  resyncInterval: 60

env: {}
envFrom: []
extraEnv: []

initContainers: []
# Example:
#   - name: wait-db
#     image: busybox
#     command: ['sh', '-c', 'until nc -z db 5432; do sleep 1; done']

securityContext: {}
# Example:
#   runAsUser: 1000
#   runAsGroup: 1000
#   fsGroup: 1000
#   fsGroupChangePolicy: OnRootMismatch

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

probes:
  liveness:
    enabled: true
    type: httpGet # Options: httpGet, tcpSocket, exec
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    type: httpGet # Options: httpGet, tcpSocket, exec
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
