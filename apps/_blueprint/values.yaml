image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

replicas: 1
containerPort: 80
strategy: Recreate

dns:
  hostname: ""
  exposure: "internal"

homepage:
  enabled: true
  name: ""
  description: ""
  icon: ""
  group: "Applications"
  weight: "10"

ingress:
  proxyBodySize: "100m"
  annotations: {}

containerSecurityContext: {}

volumes: []
# Each entry:
#   - name: data
#     size: 1Gi
#     mountPath: /data
#     storageClass: longhorn    (default)
#     accessMode: ReadWriteOnce (default)

infisical:
  enabled: false
  identityId: ""
  secretsPath: ""
  secretName: ""
  projectSlug: "homelab-k8s"
  envSlug: "prod"
  resyncInterval: 60

env: {}
envFrom: []
extraEnv: []

securityContext: {}
# Example:
#   runAsUser: 1000
#   runAsGroup: 1000
#   fsGroup: 1000
#   fsGroupChangePolicy: OnRootMismatch

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

probes:
  liveness:
    enabled: true
    path: "/"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: "/"
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
