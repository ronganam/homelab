apiVersion: v1
kind: Pod
metadata:
  name: frigate-model-copier
  namespace: frigate
spec:
  containers:
  - name: copier
    image: busybox
    command: ["sleep", "3600"]
    volumeMounts:
    - name: config
      mountPath: /config
  volumes:
  - name: config
    persistentVolumeClaim:
      claimName: frigate-config
