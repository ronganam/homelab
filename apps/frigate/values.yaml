# Values to override the upstream Frigate chart
infisical:
  enabled: true
  identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
  secretsPath: "/frigate"
  secretName: "frigate-secret"
  projectSlug: "homelab-k8s"
  envSlug: "prod"

frigate:
  replicaCount: 1

  image:
    tag: "0.17.1-tensorrt"
    pullPolicy: IfNotPresent

  environment:
    YOLO_MODELS: "yolov9-s-320"

  envFromSecrets:
    - "frigate-secret"

  service:
    type: ClusterIP
    externalPort: 5000
    ports:
      - name: http
        port: 5000
        targetPort: 5000
      - name: webrtc-tcp
        port: 8555
        targetPort: 8555
        protocol: TCP
      - name: webrtc-udp
        port: 8555
        targetPort: 8555
        protocol: UDP
    annotations: {}
    labels:
      dns.service-controller.io/enabled: "true"
      dns.service-controller.io/hostname: frigate.ganam.app
      exposure.service-controller.io/type: internal

  ingress:
    enabled: false
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      # Homepage automatic service discovery annotations
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Frigate"
      gethomepage.dev/description: "NVR with realtime object detection"
      gethomepage.dev/icon: "frigate.png"
      gethomepage.dev/group: "Applications"
      gethomepage.dev/weight: "20"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=frigate,app.kubernetes.io/instance=frigate"
    hosts:
      - host: frigate.ganam.app
        paths:
          - path: /
            portName: http

  gpu:
    nvidia:
      enabled: true
      runtimeClassName: nvidia

  # Persistent storage (uses default StorageClass)
  persistence:
    media:
      enabled: true
      size: 15Gi
      accessMode: ReadWriteOnce
      mountPath: /media
    config:
      enabled: true
      size: 100Mi
      accessMode: ReadWriteOnce
      mountPath: /config

  # Example Frigate configuration (adjust to your environment)
  config: |
    environment_vars:
      FRIGATE_FRONT_CAM_URL: "{FRIGATE_FRONT_CAM_URL}"
    mqtt:
      host: "mqtt.mqtt.svc.cluster.local"
      port: 1883
      # user: "frigate"
      # password: "change-me"
    detectors:
      onnx:
        type: onnx
        device: "0"
    model:
      model_type: yolo-generic
      path: /config/model_cache/tensorrt_models/yolov9-s-320.onnx
      width: 320
      height: 320
      input_tensor: nchw
      input_dtype: float
      labelmap_path: /labelmap/coco-80.txt
    go2rtc:
      streams:
        dog_cam:
          - "ffmpeg:http://192.168.1.193:8080/video#async=1#video=h264#hardware=cuda"
          - http://192.168.1.193:8080/audio.aac
        front_cam:
          - "ffmpeg:{FRIGATE_FRONT_CAM_URL}#video=copy#audio=notrack#input=-rtsp_transport udp -fflags +genpts+igndts -analyzeduration 100M -probesize 100M"
      webrtc:
        candidates:
          - "10.11.11.10:8555"
      log:
        level: info
        rtsp: trace
    cameras:
      dog_cam:
        ffmpeg:
          hwaccel_args: preset-nvidia-h264
          inputs:
            - path: rtsp://127.0.0.1:8554/dog_cam
              roles:
                - detect
                - record
        detect:
          enabled: true
        objects:
          track:
            - dog
            - person
          filters:
            dog:
              threshold: 0.4
            person:
              threshold: 0.7
        snapshots:
          enabled: true
        record:
          enabled: true
          continuous:
            days: 3
          motion:
            days: 0
        live:
          streams:
            Main: dog_cam
      front_cam:
        ffmpeg:
          hwaccel_args: preset-nvidia-h264
          inputs:
            - path: rtsp://127.0.0.1:8554/front_cam
              roles:
                - detect
                - record
        detect:
          enabled: true
        snapshots:
          enabled: true
        record:
          enabled: true
          alerts:
            retain:
              days: 10
          detections:
            retain:
              days: 10
        live:
          streams:
            Main: front_cam
    version: 0.17-0
    semantic_search:
      enabled: true
      model: jinav1
      model_size: large
      device: "0"
      reindex: false
    face_recognition:
      enabled: false
      model_size: small
    lpr:
      enabled: false
    classification:
      bird:
        enabled: false

  resources:
    requests:
      cpu: "382m"
      memory: "4036Mi"
    limits:
      memory: "4769Mi"
      nvidia.com/gpu: 1

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 12
    readiness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 12
