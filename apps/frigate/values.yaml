# Values to override the upstream Frigate chart
infisical:
  enabled: true
  identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
  secretsPath: "/frigate"
  secretName: "frigate-secret"
  projectSlug: "homelab-k8s"
  envSlug: "prod"

frigate:
  replicaCount: 1

  image:
    tag: "0.17.1-tensorrt"
    pullPolicy: IfNotPresent

  env:
    YOLO_MODELS: "yolov9-s-320"
    GO2RTC_ALLOW_ARBITRARY_EXEC: "true"

  envFromSecrets:
    - "frigate-secret"

  service:
    type: ClusterIP
    externalPort: 5000
    ports:
      - name: http
        port: 5000
        targetPort: 5000
      - name: webrtc-tcp
        port: 8555
        targetPort: 8555
        protocol: TCP
      - name: webrtc-udp
        port: 8555
        targetPort: 8555
        protocol: UDP
    annotations: {}
    labels:
      dns.service-controller.io/enabled: "true"
      dns.service-controller.io/hostname: frigate.ganam.app
      exposure.service-controller.io/type: internal

  ingress:
    enabled: false
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      # Homepage automatic service discovery annotations
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Frigate"
      gethomepage.dev/description: "NVR with realtime object detection"
      gethomepage.dev/icon: "frigate.png"
      gethomepage.dev/group: "Applications"
      gethomepage.dev/weight: "20"
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=frigate,app.kubernetes.io/instance=frigate"
    hosts:
      - host: frigate.ganam.app
        paths:
          - path: /
            portName: http

  gpu:
    nvidia:
      enabled: true
      runtimeClassName: nvidia

  # Persistent storage (uses default StorageClass)
  persistence:
    media:
      enabled: true
      size: 15Gi
      accessMode: ReadWriteOnce
      mountPath: /media
    config:
      enabled: true
      size: 100Mi
      accessMode: ReadWriteOnce
      mountPath: /config

  config: |
    environment_vars:
      FRIGATE_FRONT_CAM_URL: '{FRIGATE_FRONT_CAM_URL}'
    mqtt:
      host: mqtt.mqtt.svc.cluster.local
      port: 1883
    detectors:
      onnx:
        type: onnx
        device: '0'
    model:
      model_type: yolo-generic
      path: /config/model_cache/tensorrt_models/yolov9-s-320.onnx
      width: 320
      height: 320
      input_tensor: nchw
      input_dtype: float
      labelmap_path: /labelmap/coco-80.txt
    go2rtc:
      streams:
        front_cam:
          - exec:sh -c '/usr/lib/ffmpeg/7.0/bin/ffmpeg -hide_banner -loglevel error -fflags nobuffer -flags low_delay -rtsp_transport udp -i "$FRIGATE_FRONT_CAM_URL" -c:v copy -an -f h264 -'#video=h264
        ptz:
          - rtsp://admin:Rg%40243199@192.168.1.203/cam/realmonitor?channel=1&subtype=0#backchannel=0
          - "ffmpeg:ptz#audio=opus"
        ptz_talk:
          - rtsp://admin:Rg%40243199@192.168.1.203/cam/realmonitor?channel=1&subtype=0
      webrtc:
        candidates:
          - 192.168.1.178:8555
          - stun:8555
      log:
        level: info
        rtsp: trace
    cameras:
      front_cam:
        ffmpeg:
          hwaccel_args: preset-nvidia-h264
          inputs:
            - path: rtsp://127.0.0.1:8554/front_cam
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          enabled: true
        snapshots:
          enabled: true
        record:
          enabled: true
          alerts:
            retain:
              days: 10
          detections:
            retain:
              days: 10
        live:
          streams:
            Main: front_cam
        motion:
          mask: 0,0.528,0.226,0.565,0.415,0.613,0.499,0.544,1,0.531,1,0,0,0
      ptz:
        ffmpeg:
          hwaccel_args: preset-nvidia-h264
          output_args:
            record: preset-record-generic-audio-copy
          inputs:
            - path: rtsp://127.0.0.1:8554/ptz
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
                - audio
        onvif:
          host: 192.168.1.203
          port: 80
          user: admin
          password: "Rg@243199"
        detect:
          enabled: true
        snapshots:
          enabled: true
        record:
          enabled: true
          alerts:
            retain:
              days: 10
          detections:
            retain:
              days: 10
        live:
          streams:
            Main: ptz
    version: 0.17-0
    semantic_search:
      enabled: true
      model: jinav1
      model_size: large
      device: '0'
      reindex: false
    face_recognition:
      enabled: false
      model_size: small
    lpr:
      enabled: false
    classification:
      bird:
        enabled: false
    camera_groups:
      Main:
        order: 1
        icon: LuAperture
        cameras:
          - front_cam
          - ptz

  resources:
    requests:
      cpu: "2808m"
      memory: "4599Mi"
    limits:
      memory: "5435Mi"
      nvidia.com/gpu: 1

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 12
    readiness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 12
