apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/name: jellyfin
    spec:
      # Schedule Jellyfin on your GPU node(s)
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: jellyfin
          image: ghcr.io/jellyfin/jellyfin:10.11.8
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8096
              name: http
          env:
            - name: TZ
              value: Asia/Jerusalem
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            # Optional: fast in-memory transcoding scratch space.
            # If you want this, set Jellyfin's "Transcoding temporary directory" to `/transcode` in the admin UI.
            - name: transcode
              mountPath: /transcode
            - name: media
              mountPath: /media
              readOnly: true
          resources:
            requests:
              cpu: "1078m"
              memory: "422Mi"
            limits:
              memory: "498Mi"
          livenessProbe:
            tcpSocket:
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 8096
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config-local
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache-local
        - name: transcode
          emptyDir:
            medium: Memory
            sizeLimit: 3Gi
        # Host media library mount
        - name: media
          nfs:
            server: 192.168.1.201
            path: /shared-data/nas-storage/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-local
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Jellyfin enforces a minimum free-space check on its data dir (under /config/data).
      # Values below 2Gi will cause startup to fail with "insufficient free space".
      # Note: PVC size != free space (filesystem overhead + Jellyfin writes). Give headroom.
      # Practical minimum to pass Jellyfin's 2Gi free-space check is usually ~3Gi.
      storage: 3Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-local
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
