db:
  nameOverride: kaneo-db
  image:
    repository: postgres
    tag: "16-alpine"
  
  containerPort: 5432
  servicePort: 5432
  
  namespace:
    enabled: true
  
  dns:
    enabled: false
  
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  volumes:
    - name: data
      size: 128Mi
      mountPath: /var/lib/postgresql/data

  # Secrets will be injected via envFrom (kaneo-secret)
  env:
    POSTGRES_USER: kaneo
    POSTGRES_DB: kaneo
    # POSTGRES_PASSWORD will come from Infisical

api:
  nameOverride: kaneo-api
  image:
    repository: ghcr.io/usekaneo/api
    tag: latest
  
  containerPort: 1337
  servicePort: 1337
  
  namespace:
    enabled: false
  
  dns:
    enabled: false
  
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  initContainers:
    - name: wait-db
      image: busybox:1.36
      command: ['sh', '-c', 'until nc -z kaneo-db 5432; do echo waiting for db; sleep 2; done;']

  env:
    KANEO_API_URL: "https://kaneo.ganam.app/api"
    KANEO_CLIENT_URL: "https://kaneo.ganam.app"

  extraEnv:
    - name: DATABASE_URL
      value: "postgresql://kaneo:$(POSTGRES_PASSWORD)@kaneo-db:5432/kaneo"

web:
  nameOverride: kaneo-web
  image:
    repository: ghcr.io/usekaneo/web
    tag: latest
  
  containerPort: 5173
  servicePort: 80
  
  namespace:
    enabled: false
  
  dns:
    hostname: kaneo.ganam.app
    exposure: internal
  
  homepage:
    enabled: true
    name: "Kaneo"
    description: "Kanban board"
    icon: "si-kanban"
    group: "Applications"

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  initContainers:
    - name: wait-api
      image: busybox:1.36
      command: ['sh', '-c', 'until nc -z kaneo-api 1337; do echo waiting for api; sleep 2; done;']

  env:
    KANEO_API_URL: "https://kaneo.ganam.app/api"
    KANEO_CLIENT_URL: "https://kaneo.ganam.app"
