db:
  nameOverride: kaneo-db
  image:
    repository: postgres
    tag: "16-alpine"
  
  containerPort: 5432
  servicePort: 5432
  
  namespace:
    enabled: true
  
  dns:
    enabled: false
  
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  volumes:
    - name: data
      size: 5Gi # Restored to 5Gi as per original plan
      mountPath: /var/lib/postgresql/data

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 30m
      memory: 96Mi

  env:
    POSTGRES_USER: kaneo
    POSTGRES_DB: kaneo
    PGDATA: /var/lib/postgresql/data/pgdata

  probes:
    liveness:
      type: tcpSocket
    readiness:
      type: tcpSocket

api:
  nameOverride: kaneo-api
  image:
    repository: ghcr.io/usekaneo/api
    tag: latest
  
  containerPort: 1337
  servicePort: 1337
  
  namespace:
    enabled: false
  
  dns:
    enabled: true
    hostname: kaneo.ganam.app
    exposure: internal
  
  ingress:
    path: /api
    annotations: {}
  
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  initContainers:
    - name: wait-db
      image: busybox:1.37
      command: ['sh', '-c', 'until nc -z kaneo-db 5432; do echo waiting for db; sleep 2; done;']

  env:
    KANEO_API_URL: "https://kaneo.ganam.app/api"
    KANEO_CLIENT_URL: "https://kaneo.ganam.app"

  extraEnv:
    - name: DATABASE_URL
      value: "postgresql://kaneo:$(POSTGRES_PASSWORD)@kaneo-db:5432/kaneo"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 320Mi

  probes:
    liveness:
      type: tcpSocket # Safe default if health path is unknown
    readiness:
      type: tcpSocket

web:
  nameOverride: kaneo-web
  image:
    repository: ghcr.io/usekaneo/web
    tag: latest
  
  containerPort: 5173
  servicePort: 80
  
  namespace:
    enabled: false
  
  dns:
    hostname: kaneo.ganam.app
    exposure: internal
  
  homepage:
    enabled: true
    name: "Kaneo"
    description: "Kanban board"
    icon: "si-kanban"
    group: "Applications"

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/kaneo"
    secretName: kaneo-secret

  initContainers:
    - name: wait-api
      image: busybox:1.37
      command: ['sh', '-c', 'until nc -z kaneo-api 1337; do echo waiting for api; sleep 2; done;']

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 30m
      memory: 32Mi

  env:
    KANEO_API_URL: "https://kaneo.ganam.app/api"
    KANEO_CLIENT_URL: "https://kaneo.ganam.app"
