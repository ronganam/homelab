apiVersion: v1
kind: ServiceAccount
metadata:
  name: matomo-log-importer
  namespace: matomo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: matomo-log-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: matomo-log-reader-binding
subjects:
  - kind: ServiceAccount
    name: matomo-log-importer
    namespace: matomo
roleRef:
  kind: ClusterRole
  name: matomo-log-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matomo-log-importer
  namespace: matomo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matomo-log-importer
  template:
    metadata:
      labels:
        app: matomo-log-importer
    spec:
      serviceAccountName: matomo-log-importer
      containers:
        - name: importer
          image: python:2.7-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              apt-get update && apt-get install -y curl jq
              K8S_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
              curl -LO "https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/amd64/kubectl"
              chmod +x kubectl
              mv kubectl /usr/local/bin/

              echo "📥 Downloading Matomo log-analytics script..."
              curl -s -o import_logs.py https://raw.githubusercontent.com/matomo-org/matomo-log-analytics/master/import_logs.py

              echo "🚀 Starting Log Import Loop..."
              # We use a regex to parse the Envoy Gateway JSON logs
              # Note: Envoy logs use :authority for the hostname
              
              kubectl logs -n envoy-gateway-system -l app.kubernetes.io/name=envoy -c envoy -f --tail=0 | \
              python3 import_logs.py \
                --url=http://matomo.matomo.svc.cluster.local \
                --token-auth="${MATOMO_TOKEN}" \
                --idsite=1 \
                --recorders=4 \
                --enable-static \
                --enable-bots \
                --enable-http-errors \
                --enable-http-redirects \
                --log-format-regex='.*":authority":"(?P<host>[^"]+)".*"downstream_remote_address":"(?P<ip>[^"]+)".*"method":"(?P<method>[^"]+)".*"x-envoy-origin-path":"(?P<path>[^"]+)".*"protocol":"(?P<protocol>[^"]+)".*"response_code":(?P<status>\d+).*"bytes_sent":(?P<length>\d+).*"user-agent":"(?P<user_agent>[^"]+)".*' \
                -
          env:
            - name: MATOMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: matomo-mariadb
                  key: matomo-token
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
