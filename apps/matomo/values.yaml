global:
  security:
    allowInsecureImages: true

infisical:
  enabled: true
  identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
  projectSlug: "homelab-k8s"
  envSlug: "prod"
  secretsPath: "/matomo"
  resyncInterval: 60

matomo:
  replicaCount: 0
  cronjobs:
    taskScheduler:
      enabled: false
    archive:
      enabled: false
  image:
    registry: public.ecr.aws
    repository: bitnami/matomo
    tag: 5.10.0-debian-12-r2
  matomoUsername: "admin"
  existingSecret: "matomo-mariadb"
  matomoEmail: "admin@ganam.app"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 768Mi

  mariadb:
    enabled: false
    architecture: standalone
    image:
      registry: public.ecr.aws
      repository: bitnami/mariadb
      tag: 12.2.2-debian-12-r6
    auth:
      existingSecret: "matomo-mariadb"
      database: "bitnami_matomo"
      username: "bn_matomo"
    primary:
      persistence:
        enabled: true
        storageClass: "local-path"
        size: 1Gi

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 1Gi

  commonLabels:
    dns.service-controller.io/enabled: "true"
    dns.service-controller.io/hostname: "matomo.ganam.app"
    exposure.service-controller.io/type: "internal"

  service:
    type: ClusterIP

  ingress:
    enabled: false

logImporter:
  enabled: false
