# INTERNAL Service - accessible via ingress (HTTPRoute)
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    # DNS Management Labels for Service Controller
    dns.service-controller.io/enabled: "true"
    dns.service-controller.io/hostname: "openclaw.ganam.app"
    exposure.service-controller.io/type: "internal"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 18789
      protocol: TCP
  selector:
    app: openclaw
