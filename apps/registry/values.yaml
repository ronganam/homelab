app-blueprint:
  image:
    repository: registry
    tag: "3.1.0"

  containerPort: 5000

  dns:
    hostname: registry.ganam.app
    exposure: internal

  homepage:
    enabled: false

  ingress:
    proxyBodySize: "0"
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"

  volumes:
    - name: data
      size: 5Gi
      mountPath: /var/lib/registry

  env:
    REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
    REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: "/var/lib/registry"
    REGISTRY_STORAGE_DELETE_ENABLED: "true"

  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 300m
      memory: 128Mi

  probes:
    liveness:
      path: "/v2/"
      initialDelaySeconds: 10
      periodSeconds: 20
      failureThreshold: 6
    readiness:
      path: "/v2/"
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 6
