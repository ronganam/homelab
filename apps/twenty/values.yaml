# Common environment variables
commonEnv: &commonEnv
  PG_DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@twenty-db:5432/default"
  SERVER_URL: "https://twenty.ganam.app"
  REDIS_URL: "redis://twenty-redis:6379"
  STORAGE_TYPE: "local"

server:
  nameOverride: "twenty-server"
  
  image:
    repository: "twentycrm/twenty"
    tag: "latest"
  
  containerPort: 3000
  servicePort: 3000
  
  namespace:
    enabled: true
    
  dns:
    enabled: true
    hostname: "twenty.ganam.app"
    exposure: "internal"
    
  homepage:
    enabled: true
    name: "Twenty"
    description: "Open Source CRM"
    icon: "si-twenty"
    group: "Applications"

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/twenty"
    secretName: twenty-secret

  initContainers:
    - name: wait-db-redis
      image: busybox:1.36
      command: ['sh', '-c', 'until nc -z twenty-db 5432 && nc -z twenty-redis 6379; do echo waiting for db and redis; sleep 2; done;']

  env:
    <<: *commonEnv
    NODE_PORT: "3000"
    DISABLE_DB_MIGRATIONS: "false"
    DISABLE_CRON_JOBS_REGISTRATION: "false"

  volumes:
    - name: server-local-data
      mountPath: /app/packages/twenty-server/.local-storage
      hostPath: /media/volumes/twenty/local-storage
      hostPathType: DirectoryOrCreate

  probes:
    liveness:
      enabled: true
      type: httpGet
      path: "/healthz"
    readiness:
      enabled: true
      type: httpGet
      path: "/healthz"

worker:
  nameOverride: "twenty-worker"
  
  image:
    repository: "twentycrm/twenty"
    tag: "latest"
  
  command: ["yarn"]
  args: ["worker:prod"]

  namespace:
    enabled: false
    
  dns:
    enabled: false
    
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/twenty"
    secretName: twenty-secret

  initContainers:
    - name: wait-server
      image: busybox:1.36
      command: ['sh', '-c', 'until nc -z twenty-server 3000; do echo waiting for server; sleep 2; done;']

  env:
    <<: *commonEnv
    DISABLE_DB_MIGRATIONS: "true"
    DISABLE_CRON_JOBS_REGISTRATION: "true"

  volumes:
    - name: server-local-data
      mountPath: /app/packages/twenty-server/.local-storage
      hostPath: /media/volumes/twenty/local-storage
      hostPathType: DirectoryOrCreate

  probes:
    liveness:
      enabled: false
    readiness:
      enabled: false

db:
  nameOverride: "twenty-db"
  image:
    repository: "postgres"
    tag: "16"
  
  containerPort: 5432
  servicePort: 5432
  
  namespace:
    enabled: false
    
  dns:
    enabled: false
    
  homepage:
    enabled: false

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/twenty"
    secretName: twenty-secret

  volumes:
    - name: db-data
      mountPath: /var/lib/postgresql/data
      size: 10Gi

  env:
    POSTGRES_USER: "postgres"
    POSTGRES_DB: "default"
  
  probes:
    liveness:
      enabled: true
      type: tcpSocket
    readiness:
      enabled: true
      type: tcpSocket

redis:
  nameOverride: "twenty-redis"
  image:
    repository: "redis"
    tag: "latest"
  
  command: ["redis-server"]
  args: ["--maxmemory-policy", "noeviction"]

  containerPort: 6379
  servicePort: 6379
  
  namespace:
    enabled: false
    
  dns:
    enabled: false
    
  homepage:
    enabled: false

  probes:
    liveness:
      enabled: true
      type: tcpSocket
    readiness:
      enabled: true
      type: tcpSocket
