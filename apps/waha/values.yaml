app-blueprint:
  image:
    repository: devlikeapro/waha
    tag: "noweb-2026.3.4"

  containerPort: 3000

  dns:
    hostname: waha.ganam.app
    exposure: internal

  homepage:
    name: "WAHA"
    description: "WhatsApp HTTP API"
    icon: "whatsapp.png"

  volumes:
    - name: sessions-local
      size: 128Mi
      mountPath: /app/.sessions
      storageClass: local-path
    - name: media-local
      size: 512Mi
      mountPath: /app/.media
      storageClass: local-path

  infisical:
    enabled: true
    identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
    secretsPath: "/waha"
    secretName: waha-secret

  env:
    WHATSAPP_DEFAULT_ENGINE: "NOWEB"

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  probes:
    liveness:
      path: "/ping"
    readiness:
      path: "/ping"

  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 2Gi
