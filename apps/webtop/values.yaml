app-blueprint:
  image:
    repository: lscr.io/linuxserver/webtop
    tag: "debian-xfce-2ed75ebf-ls191"

  containerPort: 3001
  servicePort: 3001

  dns:
    hostname: webtop.ganam.app
    exposure: internal

  homepage:
    name: webtop
    description: LinuxServer.io Webtop (Debian XFCE)
    icon: webtop

  volumes:
    - name: config
      size: 1Gi
      mountPath: /config
      storageClass: longhorn
    - name: media
      mountPath: /nfs
      nfs:
        server: 192.168.1.201
        path: /shared-data/nas-storage/media

  env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Asia/Jerusalem"

  securityContext:
    runAsUser: 0
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      add: ["CHOWN", "SETGID", "SETUID", "DAC_OVERRIDE", "FOWNER"]
      drop: ["ALL"]

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  probes:
    liveness:
      enabled: false
    readiness:
      enabled: false