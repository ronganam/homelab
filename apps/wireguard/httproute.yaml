---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wireguard
  namespace: wireguard
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "WireGuard"
    gethomepage.dev/description: "WireGuard VPN - wg-easy"
    gethomepage.dev/icon: "wireguard.png"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/weight: "20"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    - "wireguard.ganam.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: wireguard
          port: 80
