apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Argo CD"
    gethomepage.dev/description: "GitOps Continuous Delivery"
    gethomepage.dev/icon: "argo-cd"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/weight: "1"
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: gateway-system
  hostnames:
    - "argocd.ganam.app"
    - "argo.ganam.app"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
