apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: homelab-proxy-config
    namespace: envoy-gateway-system
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: homelab-proxy-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Local
        annotations:
          metallb.universe.tf/loadBalancerIPs: 192.168.1.178
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: gateway-system
  annotations:
    # MetalLB static IP assignment
    metallb.universe.tf/loadBalancerIPs: 192.168.1.178
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-internal-tls
            namespace: ingress-nginx
      allowedRoutes:
        namespaces:
          from: All
    # Frigate WebRTC listeners on port 8555
    # Required for real-time WebRTC UDP/TCP media streaming to avoid MSE buffering latency.
    # Exposing these via Gateway allows using the domain name (frigate.ganam.app:8555)
    # as a WebRTC candidate, preventing HTTPS private network access blocks in modern browsers.
    - name: webrtc-tcp
      port: 8555
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: All
    - name: webrtc-udp
      port: 8555
      protocol: UDP
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-certs
  namespace: ingress-nginx
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway-system
  to:
    - group: ""
      kind: Secret
      name: wildcard-internal-tls
