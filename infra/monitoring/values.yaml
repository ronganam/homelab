infisical:
  enabled: true
  identityId: "646edad3-7cfd-466a-b6cd-6114b3682e3c"
  projectSlug: "homelab-k8s"
  envSlug: "prod"
  secretsPath: "/monitoring"
  resyncInterval: 60

kube-prometheus-stack:
  admissionWebhooks:
    enabled: false
  preUpgradeHook:
    enabled: false
  grafana:
    enabled: true
    adminPassword: "admin"
    # Add proper labels for homepage discovery
    podLabels:
      app.kubernetes.io/name: grafana
    serviceLabels:
      app.kubernetes.io/name: grafana
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        # Homepage automatic service discovery annotations
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Grafana"
        gethomepage.dev/description: "Monitoring Dashboards"
        gethomepage.dev/icon: "grafana.png"
        gethomepage.dev/group: "Monitoring"
        gethomepage.dev/weight: "3"
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana,app.kubernetes.io/instance=monitoring"
      hosts:
        - grafana.ganam.app
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
      labels:
        dns.service-controller.io/enabled: "true"
        dns.service-controller.io/hostname: grafana.ganam.app
        exposure.service-controller.io/type: internal
    persistence:
      enabled: true
      size: 1Gi
      storageClassName: longhorn
    defaultDashboardsEnabled: true
    plugins:
      - grafana-piechart-panel
      - grafana-worldmap-panel
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'longhorn-dashboards'
            orgId: 1
            folder: 'Longhorn'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/longhorn
    dashboards:
      longhorn:
        longhorn-dashboard:
          gnetId: 17626
          revision: 1
          datasource: Prometheus
          inputs:
            - name: DS_PROMETHEUS
              type: datasource
              pluginId: prometheus
              value: Prometheus
  prometheus:
    enabled: true
    # Add proper labels for homepage discovery (keep defaults; use pod-selector annotation instead)
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        # Homepage automatic service discovery annotations
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Prometheus"
        gethomepage.dev/description: "Metrics Collection"
        gethomepage.dev/icon: "prometheus.png"
        gethomepage.dev/group: "Monitoring"
        gethomepage.dev/weight: "4"
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=prometheus,app.kubernetes.io/instance=monitoring"
      hosts:
        - prometheus.ganam.app
    service:
      type: ClusterIP
      port: 80
      targetPort: 9090
      labels:
        dns.service-controller.io/enabled: "true"
        dns.service-controller.io/hostname: prometheus.ganam.app
        exposure.service-controller.io/type: internal
    additionalServiceMonitors:
      - name: "longhorn-monitoring"
        selector:
          matchLabels:
            app: longhorn-manager
        namespaceSelector:
          matchNames:
            - "longhorn-system"
        endpoints:
          - port: manager
            path: /metrics
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      retention: 7d
      retentionSize: 2GiB
      walCompression: true
      additionalArgs:
        - name: storage.tsdb.min-block-duration
          value: "30m"
        - name: storage.tsdb.max-block-duration
          value: "30m"
        - name: storage.tsdb.wal-segment-size
          value: "64MB"
        - name: storage.tsdb.head-chunks-write-queue-size
          value: "1000"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 4Gi
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        fsGroup: 65534
  alertmanager:
    enabled: true
    # Add proper labels for homepage discovery
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Alertmanager"
        gethomepage.dev/description: "Alert Management"
        gethomepage.dev/icon: "alertmanager.png"
        gethomepage.dev/group: "Monitoring"
        gethomepage.dev/weight: "5"
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=alertmanager,app.kubernetes.io/instance=monitoring"
      hosts:
        - alertmanager.ganam.app
    service:
      type: ClusterIP
      port: 80
      targetPort: 9093
      labels:
        dns.service-controller.io/enabled: "true"
        dns.service-controller.io/hostname: alertmanager.ganam.app
        exposure.service-controller.io/type: internal
    alertmanagerSpec:
      secrets:
        - alertmanager-secrets
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'telegram'
        routes:
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            alertname: InfoInhibitor
          receiver: 'null'
      inhibit_rules:
      - source_match:
          alertname: InfoInhibitor
        target_match:
          severity: info
        equal:
        - namespace
      receivers:
      - name: 'null'
      - name: 'telegram'
        telegram_configs:
        - bot_token_file: /etc/alertmanager/secrets/alertmanager-secrets/TELEGRAM_BOT_TOKEN
          api_url: "https://api.telegram.org"
          chat_id: -668037263
          parse_mode: 'HTML'
          message: |-
            {{ range .Alerts }}
            {{ if eq .Status "firing" }}🔥 <b>[{{ .Labels.severity | toUpper }}]</b> {{ .Labels.alertname }}{{ else }}✅ <b>[RESOLVED]</b> {{ .Labels.alertname }}{{ end }}
            {{ if .Annotations.summary }}<b>Summary:</b> {{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}<b>Description:</b> <i>{{ .Annotations.description }}</i>{{ end }}
            
            <b>Labels:</b>
            {{ range .Labels.SortedPairs }}  • {{ .Name }}: <code>{{ .Value }}</code>
            {{ end }}
            {{ end }}
  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true
  kubelet:
    enabled: true
  kubeApiServer:
    enabled: true
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
  coreDns:
    enabled: true
  kubeDns:
    enabled: false
