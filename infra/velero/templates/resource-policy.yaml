{{- if .Values.resourcePolicy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-resource-policy
  namespace: {{ .Release.Namespace }}
data:
  policy.yaml: |
    version: v1
    volumePolicies:
    - conditions:
        volumeTypes:
        - nfs
        - hostPath
        - emptyDir
      action:
        type: skip
{{- end }}
